# Kubernetes service account bound to the GCP runtime SA via Workload Identity.
# No key files — the pod gets ADC for parallelcs-run@dmjone.iam.gserviceaccount.com.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: parallelcs
  namespace: parallelcs
  annotations:
    iam.gke.io/gcp-service-account: parallelcs-run@dmjone.iam.gserviceaccount.com
