# ParallelCS workload. Mirrors the Cloud Run resource shape (1 vCPU / 512Mi).
# Scale-to-zero on Cloud Run has no direct K8s analogue; replicas start at 1 here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parallelcs
  namespace: parallelcs
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: parallelcs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: parallelcs
    spec:
      serviceAccountName: parallelcs
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: parallelcs
          image: parallelcs:latest
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: parallelcs-env
          env:
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
