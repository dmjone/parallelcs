name: Deploy to Cloud Run

# Auto-redeploy so production (and the bundled seed inside the image, for a clean
# cold start / DR) tracks main. Authenticates to GCP with keyless Workload
# Identity Federation, no service-account keys. The deploy inherits the existing
# service's env, the zs-api-key secret binding and the parallelcs-run runtime SA;
# it only swaps in the new source.
#
# Gating: this workflow runs only after the "Verify" workflow finishes
# successfully on main (typecheck, lint, resilience smoke test, audit, SBOM).
# workflow_dispatch is preserved so the seed-sync job and humans can still
# trigger an out-of-band deploy.
#
# DR safety: before the build, the deploy fetches the freshest curriculum from
# the live /api/curriculum and writes it into the bundled seed. The GCS bucket
# is and remains the source of truth; getCurriculum() reads from GCS on a warm
# bucket and only falls back to the bundled seed on a cold start / DR. By
# baking the freshest seed into every deployed image, a cold-start DR can
# never regress production to a curriculum the AI has already evolved past,
# even if the repo's committed seed is lagging between daily sync-seed runs.

on:
  workflow_run:
    workflows: ["Verify"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {} # manual + triggered by the seed-sync job after a seed bump

permissions:
  contents: read
  id-token: write # required to mint the WIF OIDC token

concurrency:
  group: deploy-cloud-run
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        # Needed for the dependency-free scripts/sync-seed.mjs step below.
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bake the freshest live curriculum into the bundled seed
        # Pulls the live /api/curriculum into src/content/seed-curriculum.json so
        # the image carries the AI's latest evolution. sync-seed refuses to
        # downgrade and no-ops when versions match. A transient failure (live
        # unreachable, schema check) is tolerated: the deploy continues with the
        # repo seed, which is the last known good baked by the daily sync.
        run: node scripts/sync-seed.mjs || echo "sync-seed unavailable; falling back to repo seed (last known good)"

      - name: Authenticate to GCP (keyless, Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/107722137045/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: parallelcs-deployer@dmjone.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy from source to Cloud Run
        run: |
          gcloud run deploy parallelcs \
            --source . \
            --region asia-east1 \
            --project dmjone \
            --quiet
